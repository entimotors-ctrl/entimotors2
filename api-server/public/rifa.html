<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENTIMOTORS | Gran Rifa del Taller</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@300;400;600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #0a0a0a; 
            color: #fff; 
            min-height: 100vh;
        }
        .font-teko { font-family: 'Teko', sans-serif; }
        .glass-panel { 
            background: rgba(255,255,255,0.03); 
            backdrop-filter: blur(16px); 
            border: 1px solid rgba(255,255,255,0.08); 
            border-radius: 1.25rem; 
        }
        .input-field {
            width: 100%;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            outline: none;
            transition: border-color 0.3s;
            text-transform: uppercase;
        }
        .input-field:focus { border-color: #e11d48; }
    </style>
</head>
<body class="flex flex-col items-center justify-center pt-20 pb-10 px-6 relative">

    <a href="/" class="absolute top-6 left-6 text-gray-400 hover:text-white transition-colors flex items-center gap-2 font-teko text-xl tracking-widest uppercase">
        ← Volver al inicio
    </a>

    <div class="max-w-xl w-full text-center mb-8">
        <span class="text-red-500 font-bold uppercase tracking-[0.3em] text-xs px-3 py-1 bg-red-600/10 rounded-full">Sorteo Especial</span>
        <h1 class="text-5xl sm:text-6xl font-teko uppercase mt-4 font-bold leading-none">Gran Rifa <span class="text-red-600 italic">ENTIMOTORS</span></h1>
        <p class="text-gray-400 mt-4">Fecha del sorteo: <span class="text-white font-bold">10 de Mayo de 2026</span></p>
    </div>

    <div class="glass-panel w-full max-w-md p-8 shadow-2xl">
        <form id="form-rifa" class="space-y-6">
            
            <div>
                <label class="block text-gray-400 text-sm mb-2 uppercase tracking-wider font-bold">Código Asignado</label>
                <input type="text" id="codigo" required placeholder="Ej: ENTIM-000" class="input-field font-mono text-center text-xl" autocomplete="off">
            </div>

            <div>
                <label class="block text-gray-400 text-sm mb-2 uppercase tracking-wider font-bold">Nombre Completo</label>
                <input type="text" id="nombre" required placeholder="Tu nombre y apellido" class="input-field">
            </div>

            <div>
                <label class="block text-gray-400 text-sm mb-2 uppercase tracking-wider font-bold">Número de Teléfono</label>
                <input type="tel" id="telefono" required placeholder="Ej: 9999-9999" class="input-field">
            </div>

            <button type="submit" id="btn-submit" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-4 rounded-lg uppercase tracking-widest transition-all shadow-lg shadow-red-600/20">
                Registrar mi código
            </button>

            <div id="mensaje" class="hidden text-center text-sm font-bold p-3 rounded-lg mt-4"></div>
        </form>
    </div>

    <script>
        // Los 50 códigos válidos de la tabla
        const codigosValidos = [
            'ENTIM-H8A', 'ENTIM-C9B', 'ENTIM-J0C', 'ENTIM-D1D', 'ENTIM-K2E', 
            'ENTIM-E3F', 'ENTIM-L4G', 'ENTIM-F5H', 'ENTIM-M6I', 'ENTIM-G7J', 
            'ENTIM-Z8K', 'ENTIM-Y9L', 'ENTIM-X0M', 'ENTIM-W1N', 'ENTIM-V2O', 
            'ENTIM-U3P', 'ENTIM-T4Q', 'ENTIM-S5R', 'ENTIM-R6S', 'ENTIM-Q7T', 
            'ENTIM-P8U', 'ENTIM-O9V', 'ENTIM-N0W', 'ENTIM-M1X', 'ENTIM-L2Y', 
            'ENTIM-K3Z', 'ENTIM-J4A', 'ENTIM-I5B', 'ENTIM-H6C', 'ENTIM-G7D', 
            'ENTIM-F8E', 'ENTIM-E9F', 'ENTIM-D0G', 'ENTIM-C1H', 'ENTIM-B2I', 
            'ENTIM-A3J', 'ENTIM-Z4K', 'ENTIM-Y5L', 'ENTIM-X6M', 'ENTIM-W7N', 
            'ENTIM-V8O', 'ENTIM-U9P', 'ENTIM-T0Q', 'ENTIM-S1R', 'ENTIM-R2S', 
            'ENTIM-Q3T', 'ENTIM-P4U', 'ENTIM-O5V', 'ENTIM-N6W', 'ENTIM-M7X'
        ];

        // Los 13 códigos que ya vendiste (Incluyendo los 3 nuevos asignados)
        const codigosYaUsados = [
            'ENTIM-H8A', 'ENTIM-J0C', 'ENTIM-D1D', 'ENTIM-K2E', 'ENTIM-E3F', 
            'ENTIM-L4G', 'ENTIM-F5H', 'ENTIM-G7J', 'ENTIM-Z4K', 'ENTIM-R2S',
            'ENTIM-M7X', 'ENTIM-N6W', 'ENTIM-O5V'
        ];

        document.getElementById('form-rifa').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const codigo = document.getElementById('codigo').value.trim().toUpperCase();
            const nombre = document.getElementById('nombre').value.trim();
            const telefono = document.getElementById('telefono').value.trim();
            const btn = document.getElementById('btn-submit');
            const mensaje = document.getElementById('mensaje');

            mensaje.className = 'hidden';

            if (!codigosValidos.includes(codigo)) {
                mensaje.classList.remove('hidden');
                mensaje.classList.add('bg-red-600/20', 'text-red-400', 'border', 'border-red-500/30');
                mensaje.innerText = '❌ Código inválido. Revisa tu boleto.';
                return;
            }

            if (codigosYaUsados.includes(codigo)) {
                mensaje.classList.remove('hidden');
                mensaje.classList.add('bg-orange-600/20', 'text-orange-400', 'border', 'border-orange-500/30');
                mensaje.innerText = '⚠️ Este código ya fue registrado anteriormente.';
                return;
            }

            btn.disabled = true;
            btn.innerText = 'Guardando...';

            try {
                const response = await fetch('/api/rifa/registrar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ codigo, nombre, telefono })
                });

                const data = await response.json();
                mensaje.classList.remove('hidden');
                
                if (response.ok) {
                    mensaje.classList.add('bg-green-600/20', 'text-green-400', 'border', 'border-green-500/30');
                    mensaje.innerText = '✅ ¡Éxito! Tu código está registrado para el 10 de Mayo.';
                    document.getElementById('form-rifa').reset();
                    // Agregar el código a la memoria temporal para que no lo puedan volver a usar sin recargar
                    codigosYaUsados.push(codigo); 
                } else {
                    mensaje.classList.add('bg-red-600/20', 'text-red-400', 'border', 'border-red-500/30');
                    mensaje.innerText = data.error || 'Hubo un error al registrar.';
                }
            } catch (error) {
                mensaje.classList.remove('hidden');
                mensaje.classList.add('bg-red-600/20', 'text-red-400', 'border', 'border-red-500/30');
                mensaje.innerText = 'Error de conexión. Intenta de nuevo.';
            } finally {
                btn.disabled = false;
                btn.innerText = 'Registrar mi código';
            }
        });
    </script>
</body>
</html>
